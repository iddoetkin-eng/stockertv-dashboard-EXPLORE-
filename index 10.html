const CORR_TICKERS = ['NVDA','AAPL','MSFT','GOOGL','META','AMZN','TSLA','JPM','UNH','BRK.B'];
function generateCorrelationMatrix() {
  const m = [];
  for (let i = 0; i < CORR_TICKERS.length; i++) {
    const row = [];
    for (let j = 0; j < CORR_TICKERS.length; j++) {
      if (i === j) row.push(1.0);
      else {
        // somewhat realistic clusters
        const sectorA = i < 5 ? 'tech' : i < 7 ? 'auto' : i < 9 ? 'fin' : 'fin';
        const sectorB = j < 5 ? 'tech' : j < 7 ? 'auto' : j < 9 ? 'fin' : 'fin';
        const base = sectorA === sectorB ? 0.55 + Math.random() * 0.35 : 0.05 + Math.random() * 0.4;
        row.push(parseFloat(base.toFixed(2)));
      }
    }
    m.push(row);
  }
  return m;
}

// === Sparkline mini-data for any ticker ===
function generateSparkline(seed = 1, points = 24) {
  const arr = [];
  let v = 50;
  for (let i = 0; i < points; i++) {
    v += (Math.sin(i * 0.4 + seed) * 4) + (Math.random() - 0.5) * 3;
    arr.push(Math.max(10, Math.min(90, v)));
  }
  return arr;
}

const FX_CURRENCIES = ['USD', 'EUR', 'JPY', 'GBP', 'CHF', 'AUD', 'CAD', 'ILS'];
function generateFXMatrix() {
  // Each cell = how much COL you get for 1 ROW
  const baseRates = { USD: 1, EUR: 0.92, JPY: 149.32, GBP: 0.79, CHF: 0.88, AUD: 1.52, CAD: 1.36, ILS: 3.71 };
  const m = [];
  for (let i = 0; i < FX_CURRENCIES.length; i++) {
    const row = [];
    for (let j = 0; j < FX_CURRENCIES.length; j++) {
      if (i === j) { row.push({ rate: 1, change: 0 }); continue; }
      const rate = baseRates[FX_CURRENCIES[j]] / baseRates[FX_CURRENCIES[i]];
      const change = (Math.random() - 0.5) * 1.4;
      row.push({ rate, change });
    }
    m.push(row);
  }
  return m;
}

// === VOLATILITY SURFACE — IV per tenor/strike ===
const VOL_TENORS = ['1W', '1M', '3M', '6M', '1Y'];
const VOL_STRIKES = ['80%', '90%', '100%', '110%', '120%'];
function generateVolSurface() {
  const m = [];
  for (let i = 0; i < VOL_TENORS.length; i++) {
    const row = [];
    for (let j = 0; j < VOL_STRIKES.length; j++) {
      // Smile: higher at OTM, slight skew
      const moneyness = j - 2;
      const tenorFactor = i / 4;
      const iv = 18 + Math.abs(moneyness) * 3.2 - moneyness * 1.4 + tenorFactor * 4 + Math.random() * 1.5;
      row.push(parseFloat(iv.toFixed(1)));
    }
    m.push(row);
  }
  return m;
}

const latLngToVec3 = (lat, lng, radius) => {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  const x = -(radius * Math.sin(phi) * Math.cos(theta));
  const z = radius * Math.sin(phi) * Math.sin(theta);
  const y = radius * Math.cos(phi);
  return new THREE.Vector3(x, y, z);
};

function generateLandDots(density = 3) {
  const dots = [];
  for (let lat = -55; lat <= 80; lat += density) {
    const lngStep = density / Math.max(0.15, Math.cos(lat * Math.PI / 180));
    for (let lng = -180; lng <= 180; lng += lngStep) {
      if (isLand(lat, lng)) dots.push([lat, lng]);
    }
  }
  return dots;
}

// Polar ice cap dots — spread around both poles
function generatePolarDots() {
  const dots = [];
  // North pole region
  for (let lat = 72; lat <= 89; lat += 2) {
    const step = 360 / Math.max(6, Math.cos(lat * Math.PI / 180) * 40);
    for (let lng = -180; lng < 180; lng += step) {
      dots.push([lat, lng]);
    }
  }
  // Antarctica — rough circle
  for (let lat = -88; lat <= -65; lat += 2.5) {
    const step = 360 / Math.max(6, Math.cos(lat * Math.PI / 180) * 40);
    for (let lng = -180; lng < 180; lng += step) {
      dots.push([lat, lng]);
    }
  }
  return dots;
}

// Starfield — random points on a large sphere
function generateStars(count = 1800) {
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 30 + Math.random() * 18;
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
    // Slight color variation — warm to cool
    const tint = Math.random();
    colors[i * 3]     = tint > 0.7 ? 1.0 : 0.85;
    colors[i * 3 + 1] = 0.88;
    colors[i * 3 + 2] = tint > 0.7 ? 0.7 : 1.0;
    sizes[i] = Math.random() < 0.1 ? 0.18 : (0.05 + Math.random() * 0.09);
  }
  return { positions, colors, sizes };
}

// Densify a polygon — subdivide edges so lines on sphere don't cut through
function densifyPolygon(polygon, maxStepDeg = 2.5) {
  const out = [];
  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];
    const dLat = b[0] - a[0];
    const dLng = b[1] - a[1];
    const segLen = Math.sqrt(dLat * dLat + dLng * dLng);
    const steps = Math.max(1, Math.ceil(segLen / maxStepDeg));
    for (let s = 0; s < steps; s++) {
      const t = s / steps;
      out.push([a[0] + dLat * t, a[1] + dLng * t]);
    }
  }
  out.push(polygon[0]);
  return out;
}

function getSunPosition(date) {
  const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  const lng = (12 - utcHours) * 15;
  const start = new Date(Date.UTC(date.getUTCFullYear(), 0, 0));
  const dayOfYear = Math.floor((date - start) / 86400000);
  const declination = 23.45 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
  return { lat: declination, lng };
}

function exchangeIsOpen(ex, utcHour) {
  const [o, c] = ex.openUTC;
  if (o < c) return utcHour >= o && utcHour < c;
  return utcHour >= o || utcHour < c;
}

   TOPOJSON — fetch & decode world-atlas into country features
   ============================================================ */

// CDN URL for world-atlas 110m (all countries, ~120KB gzipped)
const TOPOJSON_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';

function decodeTopoJSON(topology, objectName = 'countries') {
  const { scale, translate } = topology.transform;
  const arcs = topology.arcs.map((arc) => {
    let x = 0, y = 0;
    return arc.map(([dx, dy]) => {
      x += dx; y += dy;
      return [x * scale[0] + translate[0], y * scale[1] + translate[1]];
    });
  });
  const buildRing = (indices) => {
    const pts = [];
    indices.forEach((idx, i) => {
      const reverse = idx < 0;
      const arcIdx = reverse ? ~idx : idx;
      let a = arcs[arcIdx];
      if (reverse) a = a.slice().reverse();
      if (i > 0) a = a.slice(1);
      for (let k = 0; k < a.length; k++) pts.push(a[k]);
    });
    return pts;
  };
  const features = [];
  const obj = topology.objects && topology.objects[objectName];
  if (!obj || !obj.geometries) return features;
  obj.geometries.forEach((g) => {
    if (g.type === 'Polygon') {
      features.push({ id: g.id, polygons: [g.arcs.map(buildRing)] });
    } else if (g.type === 'MultiPolygon') {
      features.push({ id: g.id, polygons: g.arcs.map((p) => p.map(buildRing)) });
    }
  });
  return features;
}

function computeBBoxes(features) {
  features.forEach((f) => {
    let minLng = 180, maxLng = -180, minLat = 90, maxLat = -90;
    f.polygons.forEach((poly) => {
      const outer = poly[0];
      if (!outer) return;
      for (let i = 0; i < outer.length; i++) {
        const lng = outer[i][0], lat = outer[i][1];
        if (lng < minLng) minLng = lng;
        if (lng > maxLng) maxLng = lng;
        if (lat < minLat) minLat = lat;
        if (lat > maxLat) maxLat = lat;
      }
    });
    f.bbox = [minLng, minLat, maxLng, maxLat];
  });
}

function pointInRing(lng, lat, ring) {
  let inside = false;
  const n = ring.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > lat) !== (yj > lat)) &&
        (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function pointInFeature(lng, lat, feature) {
  const [minLng, minLat, maxLng, maxLat] = feature.bbox;
  if (lng < minLng || lng > maxLng || lat < minLat || lat > maxLat) return false;
  for (let p = 0; p < feature.polygons.length; p++) {
    const poly = feature.polygons[p];
    if (!poly[0] || !pointInRing(lng, lat, poly[0])) continue;
    // Check holes
    let inHole = false;
    for (let h = 1; h < poly.length; h++) {
      if (pointInRing(lng, lat, poly[h])) { inHole = true; break; }
    }
    if (!inHole) return true;
  }
  return false;
}

// Generate land dots from real country polygons — denser at equator
function generateDotsFromFeatures(features, latStep = 1.8) {
  const dots = [];
  for (let lat = -58; lat <= 82; lat += latStep) {
    const lngStep = latStep / Math.max(0.2, Math.cos(lat * Math.PI / 180));
    for (let lng = -180; lng < 180; lng += lngStep) {
      for (let f = 0; f < features.length; f++) {
        if (pointInFeature(lng, lat, features[f])) {
          dots.push([lat, lng]);
          break;
        }
      }
    }
  }
  return dots;
}

// Build LineSegments positions for all country borders
function buildBorderPositions(features, R) {
  let total = 0;
  features.forEach((f) => f.polygons.forEach((poly) => poly.forEach((r) => {
    total += Math.max(0, r.length - 1);
  })));
  const positions = new Float32Array(total * 6);
  let k = 0;
  features.forEach((f) => f.polygons.forEach((poly) => poly.forEach((ring) => {
    for (let i = 0; i < ring.length - 1; i++) {
      const a = ring[i], b = ring[i + 1];
      const v1 = latLngToVec3(a[1], a[0], R);
      const v2 = latLngToVec3(b[1], b[0], R);
      positions[k++] = v1.x; positions[k++] = v1.y; positions[k++] = v1.z;
      positions[k++] = v2.x; positions[k++] = v2.y; positions[k++] = v2.z;
    }
  })));
  return positions;
}

      const color = ex.tier === 1 ? 0xd4a574 : ex.tier === 2 ? 0x39ddff : 0x8ea6c6;
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.028, 16, 16),
        new THREE.MeshBasicMaterial({ color })
      );
      dot.position.copy(pos);
      markerGroup.add(dot);

      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.032, 0.042, 28),
        new THREE.MeshBasicMaterial({
          color, transparent: true, opacity: 0.55, side: THREE.DoubleSide,
        })
      );
      ring.position.copy(pos);
      ring.lookAt(new THREE.Vector3(0, 0, 0));
      ring.userData = { phase: Math.random() * Math.PI * 2, base: color };
      markerGroup.add(ring);

      // Invisible hit sphere — larger for easier clicking on rotating globe
      const hit = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 10, 10),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
      );
      hit.position.copy(pos);
      hit.userData.exchangeId = ex.id;
      markerGroup.add(hit);

      stateRef.current.markers[ex.id] = { dot, ring, hit, pos: pos.clone() };
    });

    // ===== CLOUD LAYER — slow counter-rotating wisps =====
    const cloudGroup = new THREE.Group();
    scene.add(cloudGroup);
    const cloudCount = perfMode ? 60 : 140;
    const cloudPositions = new Float32Array(cloudCount * 3);
    const cloudOpacities = new Float32Array(cloudCount);
    for (let i = 0; i < cloudCount; i++) {
      const lat = (Math.random() - 0.5) * 140;
      const lng = Math.random() * 360 - 180;
      const v = latLngToVec3(lat, lng, 1.69);
      cloudPositions[i * 3] = v.x;
      cloudPositions[i * 3 + 1] = v.y;
      cloudPositions[i * 3 + 2] = v.z;
      cloudOpacities[i] = 0.15 + Math.random() * 0.35;
    }
    const cloudGeo = new THREE.BufferGeometry();
    cloudGeo.setAttribute('position', new THREE.BufferAttribute(cloudPositions, 3));
    const cloudMat = new THREE.PointsMaterial({
      size: 0.10,
      color: 0xb8d4f0,
      transparent: true,
      opacity: 0.35,
      sizeAttenuation: true,
      blending: THREE.NormalBlending,
      depthWrite: false,
    });
    const clouds = new THREE.Points(cloudGeo, cloudMat);
    cloudGroup.add(clouds);
    stateRef.current.cloudGroup = cloudGroup;

    // ===== SUBMARINE CABLES — glowing arcs between continents =====
    const cableGroup = new THREE.Group();
    SUBMARINE_CABLES.forEach((cable) => {
      const a = latLngToVec3(cable[0][0], cable[0][1], 1.625);
      const b = latLngToVec3(cable[1][0], cable[1][1], 1.625);
      const mid = a.clone().lerp(b, 0.5).normalize().multiplyScalar(1.85);
      const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
      const pts = curve.getPoints(40);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({
        color: 0x39ddff, transparent: true, opacity: 0.18,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      cableGroup.add(new THREE.Line(geo, mat));
    });
    world.add(cableGroup);
    stateRef.current.cableGroup = cableGroup;

    // ===== FLIGHT ROUTES — dashed arcs higher up =====
    const flightGroup = new THREE.Group();
    const flightPackets = [];
    FLIGHT_ROUTES.forEach((route) => {
      const a = latLngToVec3(route[0][0], route[0][1], 1.62);
      const b = latLngToVec3(route[1][0], route[1][1], 1.62);
      const mid = a.clone().lerp(b, 0.5).normalize().multiplyScalar(1.95);
      const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
      const pts = curve.getPoints(60);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineDashedMaterial({
        color: 0xd4a574, transparent: true, opacity: 0.15,
        dashSize: 0.06, gapSize: 0.04,
        depthWrite: false,
      });
      const line = new THREE.Line(geo, mat);
      line.computeLineDistances();
      flightGroup.add(line);
      // moving aircraft
      const aircraft = new THREE.Mesh(
        new THREE.SphereGeometry(0.014, 8, 8),
        new THREE.MeshBasicMaterial({
          color: 0xd4a574, transparent: true, opacity: 0.95,
          blending: THREE.AdditiveBlending,
        })
      );
      flightGroup.add(aircraft);
      flightPackets.push({ aircraft, curve, phase: Math.random(), speed: 0.12 + Math.random() * 0.1 });
    });
    world.add(flightGroup);
    stateRef.current.flightPackets = flightPackets;

    // ===== AURORA — green/cyan ring around poles =====
    const aurora = new THREE.Group();
    [['#5dffaf', 75, 0.18], ['#39ddff', 78, 0.12], ['#5dffaf', -75, 0.18], ['#39ddff', -78, 0.12]].forEach(
      ([color, lat, opacity]) => {
        const ringPts = [];
        for (let lng = 0; lng <= 360; lng += 4) {
          ringPts.push(latLngToVec3(lat, lng - 180, 1.66 + Math.random() * 0.04));
        }
        const g = new THREE.BufferGeometry().setFromPoints(ringPts);
        const m = new THREE.LineBasicMaterial({
          color: new THREE.Color(color),
          transparent: true,
          opacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        aurora.add(new THREE.Line(g, m));
      }
    );
    world.add(aurora);
    stateRef.current.aurora = aurora;

    // ===== SATELLITES — 3 orbits around the globe =====
    const satGroup = new THREE.Group();
    scene.add(satGroup);
    const satellites = [];
    const satOrbits = [
      { tilt: 0.6,  speed: 0.35, color: 0xd4a574, radius: 1.95 },
      { tilt: -0.4, speed: 0.45, color: 0x39ddff, radius: 2.05 },
      { tilt: 1.2,  speed: 0.28, color: 0x6cf2a8, radius: 2.15 },
    ];
    satOrbits.forEach((orb) => {
      // Visible orbit ring
      const ringPts = [];
      for (let a = 0; a <= 64; a++) {
        const ang = (a / 64) * Math.PI * 2;
        const x = Math.cos(ang) * orb.radius;
        const y = Math.sin(ang) * orb.radius * Math.sin(orb.tilt);
        const z = Math.sin(ang) * orb.radius * Math.cos(orb.tilt);
        ringPts.push(new THREE.Vector3(x, y, z));
      }
      const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPts);
      const ringMat = new THREE.LineBasicMaterial({
        color: orb.color, transparent: true, opacity: 0.15, depthWrite: false,
      });
      satGroup.add(new THREE.Line(ringGeo, ringMat));

      // Satellite (small dot)
      const sat = new THREE.Mesh(
        new THREE.SphereGeometry(0.022, 8, 8),
        new THREE.MeshBasicMaterial({
          color: orb.color, transparent: true, opacity: 0.95,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      satGroup.add(sat);

      satellites.push({ sat, orbit: orb, phase: Math.random() * Math.PI * 2 });
    });
    stateRef.current.satellites = satellites;

    // Central hub sphere (data collector)
    const hub = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xd4a574 })
    );
    scene.add(hub);
    const hubGlow = new THREE.Mesh(
      new THREE.SphereGeometry(0.11, 16, 16),
      new THREE.MeshBasicMaterial({
        color: 0xd4a574, transparent: true, opacity: 0.25,
        blending: THREE.AdditiveBlending,
      })
    );
    scene.add(hubGlow);

    const clock = new THREE.Clock();
    let raf;

    const animate = () => {
      const dt = clock.getDelta();
      const t = clock.getElapsedTime();

      // Continuous rotation — globe always spinning
      const s = stateRef.current;
      const idleSpeed = s.paused ? 0.02 : 0.15; // slow almost to stop when inspecting
      world.rotation.y += idleSpeed * dt;
      // Gentle latitude tilt toward focused exchange
      world.rotation.x += (s.targetRotation.x - world.rotation.x) * 0.03;

      // Hub pulse
      hubGlow.scale.setScalar(1 + 0.15 * Math.sin(t * 2.4));

      // Cloud layer — slow counter-rotation for parallax depth
      if (s.cloudGroup) {
        s.cloudGroup.rotation.y -= dt * 0.025;
        s.cloudGroup.rotation.x = Math.sin(t * 0.1) * 0.04;
      }

      // Aurora — gentle pulsing opacity
      if (s.aurora) {
        s.aurora.children.forEach((line, i) => {
          const base = i % 2 === 0 ? 0.18 : 0.12;
          line.material.opacity = base + 0.08 * Math.sin(t * 0.7 + i * 1.3);
        });
      }

      // Satellites — orbit traversal
      if (s.satellites) {
        s.satellites.forEach((s2) => {
          const ang = s2.phase + t * s2.orbit.speed;
          const r = s2.orbit.radius;
          s2.sat.position.x = Math.cos(ang) * r;
          s2.sat.position.y = Math.sin(ang) * r * Math.sin(s2.orbit.tilt);
          s2.sat.position.z = Math.sin(ang) * r * Math.cos(s2.orbit.tilt);
          // Subtle pulse so they look alive
          s2.sat.material.opacity = 0.85 + 0.12 * Math.sin(t * 3 + s2.phase);
        });
      }

      // Aircraft along flight routes
      if (s.flightPackets) {
        s.flightPackets.forEach((p) => {
          const prog = (p.phase + t * p.speed * 0.1) % 1;
          const pt = p.curve.getPoint(prog);
          p.aircraft.position.copy(pt);
        });
      }

      // Exchange ring pulses
      Object.values(s.markers).forEach((m) => {
        const phase = m.ring.userData.phase;
        const sc = 1 + 0.7 * (0.5 + 0.5 * Math.sin(t * 2 + phase));
        m.ring.scale.setScalar(sc);
        m.ring.material.opacity = 0.55 * (1 - (sc - 1) / 1.5);
      });

      // Day/night coloring — use WORLD quaternion (includes tilt pivot)
      // so sun direction is correctly mapped to local point coordinates.
      const sun = getSunPosition(new Date());
      const sunDir = latLngToVec3(sun.lat, sun.lng, 1).normalize();
      const worldQuat = new THREE.Quaternion();
      world.getWorldQuaternion(worldQuat);
      const invQ = worldQuat.clone().invert();
      const localSun = sunDir.clone().applyQuaternion(invQ);
      const sx = localSun.x, sy = localSun.y, sz = localSun.z;
      const lpActive = s.landPoints;
      if (lpActive) {
        const positions = lpActive.geometry.attributes.position.array;
        const colors = s.landColors;
        const R = 1.615;
        const dotCount = positions.length / 3;
        for (let i = 0; i < dotCount; i++) {
          const idx3 = i * 3;
          const d = (positions[idx3] * sx + positions[idx3 + 1] * sy + positions[idx3 + 2] * sz) / R;
          // Three zones: day (d>0.15), twilight (-0.15<d<0.15), night (d<-0.15)
          if (d > 0.15) {
            const k = Math.max(0.35, d);
            colors[idx3]     = 0.22 * k + 0.10;
            colors[idx3 + 1] = 0.78 * k + 0.15;
            colors[idx3 + 2] = 0.95 * k + 0.18;
          } else if (d > -0.15) {
            // Twilight zone — warm pink/orange
            const tw = (d + 0.15) / 0.3; // 0..1
            colors[idx3]     = 0.85 - 0.3 * (1 - tw);
            colors[idx3 + 1] = 0.45 + 0.2 * tw;
            colors[idx3 + 2] = 0.35 + 0.3 * tw;
          } else {
            // Night — dim warm (city light glow)
            colors[idx3]     = 0.32;
            colors[idx3 + 1] = 0.20;
            colors[idx3 + 2] = 0.06;
          }
        }
        lpActive.geometry.attributes.color.needsUpdate = true;
      }

      // City lights — brighter on night side (warm gold), cooler on day (subtle)
      if (s.cityPoints && s.cityColors) {
        const cpos = s.cityPoints.geometry.attributes.position.array;
        const ccol = s.cityColors;
        const R2 = 1.622;
        for (let i = 0; i < MAJOR_CITIES.length; i++) {
          const idx3 = i * 3;
          const d = (cpos[idx3] * sx + cpos[idx3 + 1] * sy + cpos[idx3 + 2] * sz) / R2;
          if (d < -0.05) {
            // Night — bright warm city lights with pulse
            const pulse = 0.85 + 0.15 * Math.sin(t * 3 + i);
            ccol[idx3]     = 1.0 * pulse;
            ccol[idx3 + 1] = 0.78 * pulse;
            ccol[idx3 + 2] = 0.35 * pulse;
          } else {
            // Day — subtle cyan pulse
            const pulse = 0.5 + 0.15 * Math.sin(t * 2 + i);
            ccol[idx3]     = 0.45 * pulse;
            ccol[idx3 + 1] = 0.85 * pulse;
            ccol[idx3 + 2] = 1.0 * pulse;
          }
        }
        s.cityPoints.geometry.attributes.color.needsUpdate = true;
      }

      // Starfield — very slow rotation for parallax depth
      if (s.stars) {
        s.stars.rotation.y += dt * 0.008;
      }

      // Arc life & particle flow
      for (let i = s.arcs.length - 1; i >= 0; i--) {
        const a = s.arcs[i];
        a.life += dt;
        // Move particles along curve
        a.particles.forEach((p, idx) => {
          const prog = ((a.life / a.duration) + idx * 0.15) % 1;
          const pt = a.curve.getPoint(prog);
          p.position.copy(pt);
          const scale = 0.6 + 0.4 * Math.sin(prog * Math.PI);
          p.scale.setScalar(scale);
          p.material.opacity = Math.max(0, (1 - a.life / a.duration)) * 0.95;
        });
        a.line.material.opacity = Math.max(0, 0.55 * (1 - a.life / a.duration));
        if (a.life > a.duration) {
          scene.remove(a.line);
          a.particles.forEach((p) => scene.remove(p));
          a.line.geometry.dispose();
          a.line.material.dispose();
          s.arcs.splice(i, 1);
        }
      }

      // ===== SCRIPT EMISSIONS — vertical beams from exchanges =====
      for (let i = s.emissions.length - 1; i >= 0; i--) {
        const em = s.emissions[i];
        em.life += dt;
        const p = em.life / em.duration;
        if (p < 1) {
          // tip climbs from surface outward
          em.tip.position.lerpVectors(em.start, em.end, Math.min(1, p * 1.1));
          const scale = 1 + 3 * p;
          em.tip.scale.setScalar(scale);
          em.tip.material.opacity = 0.95 * (1 - p * p);
          // beam: grow then fade
          em.line.material.opacity = Math.min(1, p * 4) * (1 - p * p) * 0.75;
        } else {
          em.group.remove(em.line);
          em.group.remove(em.tip);
          em.line.geometry.dispose();
          em.line.material.dispose();
          em.tip.geometry.dispose();
          em.tip.material.dispose();
          s.emissions.splice(i, 1);
        }
      }

      renderer.render(scene, camera);
      raf = requestAnimationFrame(animate);
    };
    animate();

    // ===== CLICK RAYCASTING for exchange selection =====
    const raycaster = new THREE.Raycaster();
    raycaster.params.Points = { threshold: 0.05 };
    const mouse = new THREE.Vector2();
    stateRef.current.raycaster = raycaster;
    stateRef.current.camera = camera;

    const handleClick = (ev) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      // Expand hit testing — test invisible hit spheres we attach per marker
      const hitMeshes = Object.entries(stateRef.current.markers).map(([id, m]) => {
        m.hit.userData.exchangeId = id;
        return m.hit;
      });
      const intersects = raycaster.intersectObjects(hitMeshes, false);
      if (intersects.length > 0) {
        const hit = intersects[0].object;
        if (onExchangeClick) onExchangeClick(hit.userData.exchangeId);
      }
    };
    renderer.domElement.addEventListener('click', handleClick);
    renderer.domElement.style.cursor = 'grab';

    // Cursor feedback on hover
    const handleMove = (ev) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hitMeshes = Object.values(stateRef.current.markers).map((m) => m.hit);
      const intersects = raycaster.intersectObjects(hitMeshes, false);
      renderer.domElement.style.cursor = intersects.length > 0 ? 'pointer' : 'grab';
    };
    renderer.domElement.addEventListener('mousemove', handleMove);

    // ===== DRAG TO ROTATE =====
    let dragging = false, lastX = 0, lastY = 0, dragResumeTimer = null;
    const onDown = (ev) => {
      dragging = true;
      lastX = ev.clientX ?? (ev.touches && ev.touches[0]?.clientX) ?? 0;
      lastY = ev.clientY ?? (ev.touches && ev.touches[0]?.clientY) ?? 0;
      stateRef.current.paused = true;
      renderer.domElement.style.cursor = 'grabbing';
      if (dragResumeTimer) clearTimeout(dragResumeTimer);
    };
    const onUp = () => {
      if (!dragging) return;
      dragging = false;
      renderer.domElement.style.cursor = 'grab';
      // Resume auto-rotate after 2.5s of no drag (only if no exchange card open)
      if (dragResumeTimer) clearTimeout(dragResumeTimer);
      dragResumeTimer = setTimeout(() => {
        if (!stateRef.current.selectedLocked) stateRef.current.paused = false;
      }, 2500);
    };
    const onMoveDrag = (ev) => {
      if (!dragging) return;
      const cx = ev.clientX ?? (ev.touches && ev.touches[0]?.clientX);
      const cy = ev.clientY ?? (ev.touches && ev.touches[0]?.clientY);
      if (cx == null) return;
      const dx = cx - lastX;
      const dy = cy - lastY;
      stateRef.current.world.rotation.y += dx * 0.006;
      stateRef.current.world.rotation.x = THREE.MathUtils.clamp(
        stateRef.current.world.rotation.x + dy * 0.006, -1.2, 1.2
      );
      // When user manually tilts, update the target so auto doesn't snap back
      stateRef.current.targetRotation.x = stateRef.current.world.rotation.x;
      lastX = cx; lastY = cy;
    };
    renderer.domElement.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMoveDrag);
    renderer.domElement.addEventListener('touchstart', onDown, { passive: true });
    window.addEventListener('touchend', onUp);
    window.addEventListener('touchmove', onMoveDrag, { passive: true });

    const onResize = () => {
      const w = mount.clientWidth;
      const h = mount.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    window.addEventListener('resize', onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
      renderer.domElement.removeEventListener('click', handleClick);
      renderer.domElement.removeEventListener('mousemove', handleMove);
      renderer.domElement.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMoveDrag);
      renderer.domElement.removeEventListener('touchstart', onDown);
      window.removeEventListener('touchend', onUp);
      window.removeEventListener('touchmove', onMoveDrag);
      if (dragResumeTimer) clearTimeout(dragResumeTimer);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ===== CAPITAL FLOW — periodic arcs between exchange pairs =====
  useEffect(() => {
    const fire = () => {
      const s = stateRef.current;
      if (!s.world || !s.scene) return;
      const pair = FLOW_PAIRS[Math.floor(Math.random() * FLOW_PAIRS.length)];
      const mA = s.markers[pair[0]];
      const mB = s.markers[pair[1]];
      if (!mA || !mB) return;
      s.world.updateMatrixWorld();

      const a = mA.pos.clone().applyMatrix4(s.world.matrixWorld);
      const b = mB.pos.clone().applyMatrix4(s.world.matrixWorld);
      // Curve arcs outward from globe surface
      const mid = a.clone().lerp(b, 0.5);
      const midOut = mid.normalize().multiplyScalar(mid.length() * 0.5 + 1.25);
      const curve = new THREE.QuadraticBezierCurve3(a, midOut, b);
      const pts = curve.getPoints(40);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({
        color: 0x39ddff, transparent: true, opacity: 0.0,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      const line = new THREE.Line(geo, mat);
      s.scene.add(line);

      // Flowing packet
      const packet = new THREE.Mesh(
        new THREE.SphereGeometry(0.028, 12, 12),
        new THREE.MeshBasicMaterial({
          color: 0x39ddff, transparent: true, opacity: 0.95,
          blending: THREE.AdditiveBlending, depthWrite: false,
        })
      );
      s.scene.add(packet);

      s.arcs.push({
        line, curve, particles: [packet],
        life: 0, duration: 2.6, isFlow: true,
        pair,
      });
      // Show badge briefly
      s.activeFlowPair = pair;
      if (s.flowPairHideTimer) clearTimeout(s.flowPairHideTimer);
      s.flowPairHideTimer = setTimeout(() => { s.activeFlowPair = null; }, 2600);
    };
    const schedule = () => {
      fire();
      const delay = 3500 + Math.random() * 3500;
      const tid = setTimeout(schedule, delay);
      stateRef.current.flowTimer = tid;
    };
    const start = setTimeout(schedule, 2000);
    return () => {
      clearTimeout(start);
      if (stateRef.current.flowTimer) clearTimeout(stateRef.current.flowTimer);
      if (stateRef.current.flowPairHideTimer) clearTimeout(stateRef.current.flowPairHideTimer);
    };
  }, []);
  // Every 2-4 seconds a random exchange emits a vertical beam (script generated)
  useEffect(() => {
    const emit = () => {
      const s = stateRef.current;
      if (!s.world) return;
      // Weight by tier — tier 1 emits more often
      const weights = EXCHANGES.map((ex) => 4 - ex.tier);
      const total = weights.reduce((a, b) => a + b, 0);
      let r = Math.random() * total;
      let pick = 0;
      for (let i = 0; i < weights.length; i++) {
        r -= weights[i];
        if (r <= 0) { pick = i; break; }
      }
      const ex = EXCHANGES[pick];
      const marker = s.markers[ex.id];
      if (!marker) return;

      const startPos = marker.pos.clone();
      const endPos = marker.pos.clone().normalize().multiplyScalar(1.92);

      // Beam line
      const lineGeo = new THREE.BufferGeometry().setFromPoints([startPos, endPos]);
      const up = Math.random() > 0.35;
      const col = up ? 0x6cf2a8 : 0xff7a7a;
      const lineMat = new THREE.LineBasicMaterial({
        color: col,
        transparent: true,
        opacity: 0,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const line = new THREE.Line(lineGeo, lineMat);

      // Tip sphere
      const tip = new THREE.Mesh(
        new THREE.SphereGeometry(0.018, 10, 10),
        new THREE.MeshBasicMaterial({
          color: col,
          transparent: true,
          opacity: 0.95,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        })
      );
      tip.position.copy(startPos);

      // Attach to world group so they rotate with the globe
      s.world.add(line);
      s.world.add(tip);
      s.emissions.push({
        line, tip, start: startPos, end: endPos,
        life: 0, duration: 1.6,
        group: s.world,
      });
    };

    // Emit first one quickly, then at random intervals
    const timers = [];
    const schedule = () => {
      emit();
      const delay = 1400 + Math.random() * 1400;
      const t = setTimeout(schedule, delay);
      timers.push(t);
    };
    const start = setTimeout(schedule, 800);

    return () => {
      clearTimeout(start);
      timers.forEach(clearTimeout);
    };
  }, []);

  // Fetch real world-atlas TopoJSON and swap in detailed country dots + borders
  useEffect(() => {
    let cancelled = false;
    fetch(TOPOJSON_URL, { cache: 'force-cache' })
      .then((r) => (r.ok ? r.json() : Promise.reject(new Error('http ' + r.status))))
      .then((topology) => {
        if (cancelled) return;
        const features = decodeTopoJSON(topology, 'countries');
        if (!features.length) return;
        computeBBoxes(features);
        // Defer heavy work so UI doesn't hitch
        const dots = generateDotsFromFeatures(features, 1.8);
        const borderPositions = buildBorderPositions(features, 1.623);
        if (cancelled) return;
        const s = stateRef.current;
        if (s.swapLandData) s.swapLandData(dots);
        if (s.swapBorders) s.swapBorders(borderPositions);
      })
      .catch((err) => {
        // Silently fall back to procedural land + hardcoded borders
        // (already rendered at mount)
        if (typeof console !== 'undefined') {
          console.warn('[Globe] topology fetch failed, using fallback:', err.message);
        }
      });
    return () => { cancelled = true; };
  }, []);

  // Sync paused prop into stateRef so animate loop sees current value
  useEffect(() => {
    stateRef.current.paused = !!paused;
  }, [paused]);

  // Camera target rotation to face the focused exchange
  useEffect(() => {
    if (!focusExchange) return;
    const ex = EXCHANGES.find((e) => e.id === focusExchange);
    if (!ex) return;
    // Only tilt X toward latitude — Y continues free rotation
    const targetX = ex.lat * (Math.PI / 180) * 0.35;
    stateRef.current.targetRotation.x = targetX;
  }, [focusExchange]);

  // Trigger a new arc when arcTrigger changes
  useEffect(() => {
    if (!arcTrigger || !stateRef.current.world || !stateRef.current.scene) return;
    const s = stateRef.current;
    const world = s.world;
    const scene = s.scene;
    // World's effective rotation = tilt * world rotation (parent * child)
    // To get world-space position of a local point, apply world matrix
    world.updateMatrixWorld();

    const ex = EXCHANGES.find((e) => e.id === arcTrigger.exchangeId);
    const startLocal = ex
      ? s.markers[ex.id].pos.clone()
      : latLngToVec3(
          (Math.random() - 0.5) * 80,
          (Math.random() - 0.5) * 360,
          1.62
        );

    // Transform from world-group local coords to scene (world) coords
    const start = startLocal.clone().applyMatrix4(world.matrixWorld);
    const end = new THREE.Vector3(0, 0, 0); // central hub
    const mid = start.clone().lerp(end, 0.4).multiplyScalar(1.6);
    mid.y += 0.9;

    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    const points = curve.getPoints(60);
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({
      color: arcTrigger.up ? 0x6cf2a8 : 0xff7a7a,
      transparent: true,
      opacity: 0.6,
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);

    // Particles
    const particleColor = arcTrigger.up ? 0x6cf2a8 : 0xff7a7a;
    const particles = [];
    for (let i = 0; i < 4; i++) {
      const p = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 10, 10),
        new THREE.MeshBasicMaterial({
          color: particleColor,
          transparent: true,
          opacity: 0.95,
          blending: THREE.AdditiveBlending,
        })
      );
      if (scene) scene.add(p);
      particles.push(p);
    }

    s.arcs.push({
      line, curve, particles, life: 0, duration: 3.2,
    });
  }, [arcTrigger]);

  return <div ref={mountRef} className="absolute inset-0" />;
}

function BootSequence({ onComplete }) {
  const [phase, setPhase] = useState(0);
  const [typedStats, setTypedStats] = useState({ exchanges: 0, companies: 0, languages: 0 });
  const [logLines, setLogLines] = useState([]);
  const [audioBars, setAudioBars] = useState(Array(12).fill(0));
  const [captionIdx, setCaptionIdx] = useState(0);
  const onCompleteRef = useRef(onComplete);
  onCompleteRef.current = onComplete;

  useEffect(() => {
    // Phase 0: 0-1500ms — logo blur→focus reveal (slower, more cinematic)
    // Phase 1: 1500-4000ms — stats count-up with labels
    // Phase 2: 4000-8500ms — 4 captions × 1100ms each (slower reading)
    // Phase 3: 8500-11000ms — "READY" + dashboard preview hint
    const p1 = setTimeout(() => setPhase(1), 1500);
    const p2 = setTimeout(() => setPhase(2), 4000);
    const p3 = setTimeout(() => setPhase(3), 8500);
    const done = setTimeout(() => onCompleteRef.current && onCompleteRef.current(), 11000);
    return () => { clearTimeout(p1); clearTimeout(p2); clearTimeout(p3); clearTimeout(done); };
  }, []);

  // Animated audio bars (always on)
  useEffect(() => {
    const t = setInterval(() => {
      setAudioBars(() => Array.from({ length: 12 }, (_, i) => {
        const center = Math.exp(-Math.pow((i - 6) / 4, 2));
        return center * (0.4 + Math.random() * 0.6);
      }));
    }, 80);
    return () => clearInterval(t);
  }, []);

  // Cycling captions during phase 2 — 1100ms each gives time to read
  useEffect(() => {
    if (phase !== 2) return;
    const t = setInterval(() => setCaptionIdx((i) => (i + 1) % 4), 1100);
    return () => clearInterval(t);
  }, [phase]);

  // Stats count-up during phase 1
  useEffect(() => {
    if (phase < 1) return;
    const targets = { exchanges: 53, companies: 32190, languages: 12 };
    const startTime = Date.now();
    const dur = 2300;
    const anim = () => {
      const t = Math.min(1, (Date.now() - startTime) / dur);
      const ease = 1 - Math.pow(1 - t, 3);
      setTypedStats({
        exchanges:  Math.round(targets.exchanges  * ease),
        companies:  Math.round(targets.companies  * ease),
        languages:  Math.round(targets.languages  * ease),
      });
      if (t < 1) requestAnimationFrame(anim);
    };
    requestAnimationFrame(anim);
  }, [phase]);

  // System log lines appearing one by one during phase 2
  useEffect(() => {
    if (phase < 2) return;
    const lines = [
      '▸ CONNECT supabase.db.eu.central-1',
      '▸ SUBSCRIBE kafka://events.market.raw',
      '▸ AUTH bloomberg.api · OK',
      '▸ AUTH reuters.feed · OK',
      '▸ LOAD agent.constellation · 34 agents',
      '▸ SPAWN orchestrator × 3 replicas',
      '▸ ARM integrity.gate · L1·L2·L3',
      '▸ OPEN 5 reporter broadcast channels',
      '▸ LAUNCH pipeline · quality 110pt',
    ];
    const timers = lines.map((l, i) =>
      setTimeout(() => setLogLines((p) => [...p, l]), i * 180)
    );
    return () => timers.forEach(clearTimeout);
  }, [phase]);

  const phrases = [
    { at: 800,  text: '53 exchanges.'       },
    { at: 1200, text: '32,190 companies.'   },
    { at: 1600, text: '12 languages.'       },
    { at: 2000, text: 'Zero human editors.' },
  ];

  return (
    <div className={`boot-root-v2 boot-phase-${phase}`}>
      {/* Background grid */}
      <div className="boot-grid-v2" />

      {/* Concentric scanning rings */}
      <svg className="boot-rings" viewBox="0 0 800 800">
        {[1, 2, 3, 4, 5].map((n) => (
          <circle key={n} cx="400" cy="400" r={60 * n}
                  stroke="#d4a574" strokeOpacity={0.08}
                  strokeWidth="1" fill="none"
                  strokeDasharray="2 6" />
        ))}
        {[1, 2, 3].map((n) => (
          <circle key={`p${n}`} cx="400" cy="400"
                  r={60 * n + (Date.now() / 20) % 60}
                  stroke="#d4a574"
                  strokeOpacity={0.2 - n * 0.05}
                  strokeWidth="1"
                  fill="none"
                  className="boot-pulse-ring" />
        ))}
      </svg>

      {/* Corner brackets */}
      <div className="boot-bracket boot-bracket-tl" />
      <div className="boot-bracket boot-bracket-tr" />
      <div className="boot-bracket boot-bracket-bl" />
      <div className="boot-bracket boot-bracket-br" />

      {/* Top-left system info */}
      <div className="boot-sysinfo boot-sysinfo-tl">
        <div className="mono text-[9px]" style={{ color: '#d4a574', letterSpacing: '0.25em' }}>
          STOCKERTV.OPS
        </div>
        <div className="mono text-[9px]" style={{ color: '#6b7d9a', marginTop: 4 }}>

        </div>

        {phase >= 1 && (

        <div className="boot-audio-viz">

            <div key={i} className="boot-audio-bar"
                 style={{ height: `${h * 100}%` }} />

        {phase >= 3 && (

        {phase >= 3 && (

          </div>
        )}
      </div>

      {/* Skip button — always available */}
      <button className="boot-skip mono"
              onClick={() => onCompleteRef.current && onCompleteRef.current()}
              title="Skip intro">
        SKIP →
      </button>

      {/* Bottom-left — system log */}
      <div className="boot-log-v2">

// === MARKET PULSE EKG — heartbeat line with event spikes ===
function MarketPulseEKG({ pulseTrigger }) {
  const [samples, setSamples] = useState(() =>
    Array.from({ length: 120 }, () => 0.5 + Math.random() * 0.05)
  );
  const spikeRef = useRef(0);

  // Tick: scroll buffer left, add new sample
  useEffect(() => {
    const t = setInterval(() => {
      setSamples((prev) => {
        const next = prev.slice(1);
        let v;
        if (spikeRef.current > 0) {
          // Inject a spike pattern: up-down-flatline
          const phase = spikeRef.current;
          if (phase === 7) v = 0.15;
          else if (phase === 6) v = 0.05;
          else if (phase === 5) v = 0.95;
          else if (phase === 4) v = 0.05;
          else if (phase === 3) v = 0.55;
          else v = 0.5 + Math.random() * 0.05;
          spikeRef.current -= 1;
        } else {
          v = 0.48 + Math.random() * 0.06;
        }
        next.push(v);
        return next;
      });
    }, 60);
    return () => clearInterval(t);
  }, []);

  // Trigger a spike on external pulse
  useEffect(() => {
    if (pulseTrigger) spikeRef.current = 7;
  }, [pulseTrigger]);

  // Build SVG path
  const W = 600, H = 40;
  const pts = samples.map((v, i) => `${(i / (samples.length - 1)) * W},${(1 - v) * H}`).join(' ');
  return (
    <div className="stv-panel px-3 py-2">
      <div className="flex items-center justify-between mb-1">
        <div className="eyebrow">Market Pulse · EKG</div>
        <div className="flex items-center gap-1.5 mono text-[9px]" style={{ color: 'var(--green)' }}>
          <div className="pulse-dot" style={{ width: 6, height: 6 }} /> LIVE
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
           style={{ width: '100%', height: 36, display: 'block' }}>
        <defs>
          <linearGradient id="ekgGrad" x1="0" x2="1">
            <stop offset="0" stopColor="#6cf2a8" stopOpacity="0" />
            <stop offset="0.15" stopColor="#6cf2a8" stopOpacity="0.35" />
            <stop offset="1" stopColor="#6cf2a8" stopOpacity="1" />
          </linearGradient>
        </defs>
        <polyline fill="none" stroke="url(#ekgGrad)" strokeWidth="1.4" points={pts} />
      </svg>
    </div>
  );
}

      setLangIdx((i) => (i + 1) % story_langs.length);
    }, 3200);
    return () => clearInterval(t);
  }, [story_langs]);

  // Autoplay video on mount
  useEffect(() => {
    const v = videoRef.current;
    if (v) {
      v.muted = true;
      v.playsInline = true;
      v.play().catch(() => {});
    }
  }, []);

  // Track time + state
  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    const onTime = () => setCurrentTime(v.currentTime);
    const onDur = () => setDuration(v.duration || 0);
    const onPlay = () => setPlaying(true);
    const onPause = () => setPlaying(false);
    const onVol = () => { setMuted(v.muted); setVolume(v.volume); };
    v.addEventListener('timeupdate', onTime);
    v.addEventListener('durationchange', onDur);
    v.addEventListener('loadedmetadata', onDur);
    v.addEventListener('play', onPlay);
    v.addEventListener('pause', onPause);
    v.addEventListener('volumechange', onVol);
    return () => {
      v.removeEventListener('timeupdate', onTime);
      v.removeEventListener('durationchange', onDur);
      v.removeEventListener('loadedmetadata', onDur);
      v.removeEventListener('play', onPlay);
      v.removeEventListener('pause', onPause);
      v.removeEventListener('volumechange', onVol);
    };
  }, []);

  // Fullscreen state
  useEffect(() => {
    const onFs = () => setFullscreen(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', onFs);
    return () => document.removeEventListener('fullscreenchange', onFs);
  }, []);

  // Auto-hide controls after mouse idle (only while playing)
  const resetHideTimer = () => {
    setShowUI(true);
    if (hideTimerRef.current) clearTimeout(hideTimerRef.current);
    hideTimerRef.current = setTimeout(() => {
      if (videoRef.current && !videoRef.current.paused) setShowUI(false);
    }, 2600);
  };

  const togglePlay = (e) => {
    e?.stopPropagation();
    const v = videoRef.current; if (!v) return;
    if (v.paused) v.play(); else v.pause();
  };
  const toggleMute = (e) => {
    e?.stopPropagation();
    const v = videoRef.current; if (!v) return;
    v.muted = !v.muted;
    if (!v.muted && v.volume === 0) v.volume = 0.8;
  };
  const seekBy = (delta) => (e) => {
    e?.stopPropagation();
    const v = videoRef.current; if (!v || !v.duration) return;
    v.currentTime = Math.max(0, Math.min(v.duration, v.currentTime + delta));
  };
  const seekTo = (ratio) => {
    const v = videoRef.current; if (!v || !v.duration) return;
    v.currentTime = ratio * v.duration;
  };
  const setVol = (ratio) => {
    const v = videoRef.current; if (!v) return;
    v.volume = Math.max(0, Math.min(1, ratio));
    if (v.volume > 0) v.muted = false;
  };
  const toggleFullscreen = (e) => {
    e?.stopPropagation();
    const el = wrapRef.current;
    if (!el) return;
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);
    } else {
      document.exitFullscreen?.();
    }
  };

  const rendering = stageIdx < 8;
  const renderProgress = Math.min(100, Math.max(0, ((stageIdx + 1) / 8) * 100));
  const reporter = REPORTERS[story.reporterIdx];
  const currentLang = story_langs[langIdx];
  const langMeta = LANG_TRANSLATIONS[currentLang] || { label: currentLang, flag: '🌐' };
  const fmtTime = (s) => {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const ss = Math.floor(s % 60);
    return `${m}:${ss.toString().padStart(2, '0')}`;
  };
  const seekRatio = duration > 0 ? currentTime / duration : 0;

  return (
    <div className="stv-panel p-3 h-full">
      <div className="flex items-center justify-between mb-2">
        <div className="eyebrow">{isHero ? 'Now Playing · avatar broadcast' : 'Live Video · avatar render'}</div>
        <div className="flex items-center gap-1.5 mono text-[9px]"
             style={{ color: rendering ? 'var(--gold)' : 'var(--green)' }}>
          <div className="pulse-dot" style={{
            width: 6, height: 6,
            background: rendering ? 'var(--gold)' : 'var(--green)',
          }} />
          {rendering ? 'RENDERING' : 'READY'}
        </div>
      </div>
      <div className="divider mb-2" />

      {/* Video frame — real video with controls */}
      <div ref={wrapRef}
           className={`video-frame ${isHero ? 'video-frame-hero' : ''} ${fullscreen ? 'video-fullscreen' : ''} ${showUI ? 'ui-show' : 'ui-hide'}`}
           onMouseMove={resetHideTimer}
           onMouseEnter={resetHideTimer}
           onMouseLeave={() => { if (playing) setShowUI(false); }}
           onClick={togglePlay}>
        <video
          ref={videoRef}
          src={DEMO_VIDEO_URL}
          autoPlay muted loop playsInline
          style={{
            position: 'absolute', inset: 0,
            width: '100%', height: '100%',
            objectFit: 'cover',
            zIndex: 0,
            cursor: 'pointer',
          }}
        />

        {/* Broadcast bars overlay for TV feel */}
        <div className="broadcast-bars" />

        {/* Top overlay — LIVE + ticker + language */}
        <div className="video-top-overlay">
          <div className="flex items-center gap-1.5">
            <div className="pulse-dot" style={{ width: 6, height: 6, background: '#ff3b3b' }} />
            <span className="mono text-[10px]" style={{ color: '#fff', letterSpacing: '0.15em', fontWeight: 600 }}>
              LIVE
            </span>
          </div>
          <div className="mono text-[9.5px] px-2 py-0.5"
               style={{
                 background: 'rgba(0,0,0,0.55)',
                 border: '1px solid rgba(255,255,255,0.2)',
                 borderRadius: 2,
                 color: '#fff',
               }}>
            <span style={{ color: '#d4a574' }}>${story.ticker}</span>
            <span style={{ opacity: 0.5, margin: '0 5px' }}>·</span>
            <span style={{ color: story.up ? '#6cf2a8' : '#ff7a7a' }}>{story.move}</span>
          </div>
        </div>

        {/* Language badge (floats top-right) */}
        <div className="lang-badge slide-in" key={currentLang}>
          <span style={{ fontSize: 13 }}>{langMeta.flag}</span>
          <span className="mono text-[9px]" style={{ color: '#fff' }}>{langMeta.label}</span>
        </div>

        {/* Big center play button when paused */}
        {!playing && (
          <div className="video-big-play" onClick={togglePlay}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff">
              <polygon points="6 4 20 12 6 20" />
            </svg>
          </div>
        )}

        {/* Reporter chip — bottom-left with portrait */}
        <div className="reporter-chip">
          {reporter.portrait ? (
            <img src={reporter.portrait} alt={reporter.name} className="reporter-chip-img" />
          ) : (
            <div className="reporter-chip-fallback" style={{ background: reporter.color }}>
              {reporter.id}
            </div>
          )}
          <div>
            <div className="mono text-[8.5px]" style={{ color: '#fff', opacity: 0.65, letterSpacing: '0.1em' }}>
              {reporter.beat.toUpperCase()}
            </div>
            <div className="display text-[12px] leading-tight" style={{ color: '#fff', fontWeight: 500 }}>
              {reporter.name}
            </div>
          </div>
        </div>

        {/* ==== CUSTOM CONTROLS BAR (bottom) ==== */}
        <div className="video-controls" onClick={(e) => e.stopPropagation()}>
          {/* Seek bar */}
          <div className="video-seek"
               onClick={(e) => {
                 const r = e.currentTarget.getBoundingClientRect();
                 seekTo((e.clientX - r.left) / r.width);
               }}>
            <div className="video-seek-fill" style={{ width: `${seekRatio * 100}%` }} />
            <div className="video-seek-thumb" style={{ left: `${seekRatio * 100}%` }} />
          </div>

          {/* Button row */}
          <div className="video-btn-row">
            <button className="video-btn" onClick={togglePlay} title={playing ? 'Pause' : 'Play'}>
              {playing ? (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff">
                  <rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />
                </svg>
              ) : (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff">
                  <polygon points="6 4 20 12 6 20" />
                </svg>
              )}
            </button>

            <button className="video-btn" onClick={seekBy(-10)} title="Back 10s">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2">
                <path d="M1 4v6h6" /><path d="M3.5 10a9 9 0 1 1 2.1 5.4" />
              </svg>
              <span style={{ fontSize: 8, marginLeft: 3 }}>10</span>
            </button>

            <button className="video-btn" onClick={seekBy(10)} title="Forward 10s">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2">
                <path d="M23 4v6h-6" /><path d="M20.5 10a9 9 0 1 0-2.1 5.4" />
              </svg>
              <span style={{ fontSize: 8, marginLeft: 3 }}>10</span>
            </button>

            <div className="video-volume-group">
              <button className="video-btn" onClick={toggleMute} title={muted ? 'Unmute' : 'Mute'}>
                {muted || volume === 0 ? (
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <line x1="23" y1="9" x2="17" y2="15" /><line x1="17" y1="9" x2="23" y2="15" />
                  </svg>
                ) : (
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />

            </div>

            <div className="video-time mono">
              {fmtTime(currentTime)}<span style={{ opacity: 0.5, margin: '0 3px' }}>/</span>{fmtTime(duration)}

            <div style={{ flex: 1 }} />

            <button className="video-btn" onClick={toggleFullscreen} title={fullscreen ? 'Exit full' : 'Fullscreen'}>

        {/* Render progress bar (only visible while rendering stage active) */}
        {rendering && (
          <div className="video-render-bar">

      <div className="flex items-center justify-between mt-2 mono text-[9.5px]">

  );

function Timeline24h({ nowUtcHour, onPick, currentBeatIdx }) {
  // Generate fake script events sprinkled across 24h

    const ev = [];
    for (let h = 0; h < 24; h++) {
      // more events during US/EU overlap
      const base = h > 12 && h < 21 ? 8 : h > 7 && h < 12 ? 5 : 2;
      const n = base + Math.floor(Math.random() * 3);
      for (let i = 0; i < n; i++) {
        ev.push({
          hour: h + Math.random(),
          up: Math.random() > 0.4,
          ticker: SAMPLE_HEADLINES[Math.floor(Math.random() * SAMPLE_HEADLINES.length)].ticker,
        });
      }

  return (

          <div key={i} className="timeline-tick" style={{
            left: `${(i / 24) * 100}%`,
            height: i % 6 === 0 ? 8 : 3,

        {/* events */}
        {events.map((e, i) => (
          <div key={i} className="timeline-event"
               style={{
                 left: `${(e.hour / 24) * 100}%`,
                 background: e.up ? 'var(--green)' : 'var(--red)',

    const start = Date.now();
    setIdx(0);
    setElapsed(0);
    const tick = setInterval(() => {
      const ms = Date.now() - start;
      setElapsed(ms);
      const newIdx = KIOSK_SCRIPT.findIndex((s, i) => {
        const next = KIOSK_SCRIPT[i + 1];
        return !next || ms < next.at;
      });
      setIdx(Math.max(0, newIdx));
      if (ms > 68000) {
        clearInterval(tick);
      }
    }, 100);
    return () => clearInterval(tick);
  }, [active]);

  if (!active) return null;
  const current = KIOSK_SCRIPT[idx] || KIOSK_SCRIPT[0];
  const progress = Math.min(100, (elapsed / 68000) * 100);

  return (
    <div className="kiosk-overlay">
      <button onClick={onExit} className="kiosk-exit" title="Exit demo mode">
        ✕ EXIT DEMO
      </button>
      <div className="kiosk-caption-wrap">
        <div className="mono text-[10px]" style={{ letterSpacing: '0.24em', color: brand.primary, marginBottom: 8 }}>
          ▸ STOCKERTV · LIVE DEMO ▸
        </div>
        <div className="kiosk-caption" key={idx}>
          {current.caption}
        </div>
      </div>
      <div className="kiosk-progress">
        <div style={{ width: `${progress}%`, background: brand.primary }} />
      </div>
      <div className="kiosk-cta" style={{ opacity: progress > 90 ? 1 : 0 }}>
        <div className="mono text-[11px]" style={{ letterSpacing: '0.2em', color: brand.primary }}>
          ▶ BOOK A 30-MIN CALL
        </div>
      </div>
    </div>
  );
}

// === MINI SPARKLINE — reused everywhere ===
function Sparkline({ data, color = 'currentColor', height = 18, width = 60, fill = false }) {
  if (!data || !data.length) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const path = pts.join(' ');
  const lastUp = data[data.length - 1] >= data[0];
  const c = color === 'auto' ? (lastUp ? '#6cf2a8' : '#ff7a7a') : color;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      {fill && (
        <polygon points={`0,${height} ${path} ${width},${height}`}
                 fill={c} opacity="0.15" />
      )}
      <polyline points={path} fill="none" stroke={c} strokeWidth="1" />
    </svg>
  );
}

              return (
                <div key={ci} className="fx-cell"
                     style={{
                       background: isDiag ? 'rgba(212, 165, 116, 0.08)' :
                         up ? 'rgba(108, 242, 168, 0.04)' : 'rgba(255, 122, 122, 0.04)',
                     }}>
                  <div className="mono text-[8.5px]" style={{ color: 'var(--text)' }}>
                    {isDiag ? '—' : cell.rate.toFixed(cell.rate > 10 ? 2 : 4)}
                  </div>
                  {!isDiag && (
                    <div className="mono text-[7px]" style={{

              );
            })}

        ))}
      </div>

}

// === NETWORK THROUGHPUT GRAPH ===
function NetworkThroughput() {
  const [data, setData] = useState(() =>
    Array.from({ length: 60 }, () => ({
      in: 30 + Math.random() * 40,
      out: 20 + Math.random() * 30,
    }))
  );
  useEffect(() => {
    const t = setInterval(() => {
      setData((prev) => {
        const next = prev.slice(1);
        next.push({
          in: 30 + Math.random() * 40 + Math.sin(Date.now() / 3000) * 15,
          out: 20 + Math.random() * 30 + Math.cos(Date.now() / 4000) * 10,
        });
        return next;
      });
    }, 200);
    return () => clearInterval(t);
  }, []);
  const W = 200, H = 60;
  const max = 90;
  const inPath = data.map((d, i) => `${(i / (data.length - 1)) * W},${H - (d.in / max) * H}`).join(' ');
  const outPath = data.map((d, i) => `${(i / (data.length - 1)) * W},${H - (d.out / max) * H}`).join(' ');
  const cur = data[data.length - 1];
  return (
    <div className="stv-panel p-2.5">
      <div className="flex items-center justify-between mb-1.5">
        <div className="eyebrow">Network · throughput<InfoTip text="Real-time inbound (cyan) and outbound (gold) network traffic across all services, in Mbps. Updates 5× per second." /></div>
        <div className="mono text-[9px]">
          <span style={{ color: 'var(--cyan)' }}>↓{cur.in.toFixed(0)}</span>
          <span className="muted mx-1">·</span>
          <span style={{ color: 'var(--gold)' }}>↑{cur.out.toFixed(0)} Mbps</span>
        </div>
      </div>
      <div className="divider mb-2" />
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
           style={{ width: '100%', height: 60, display: 'block' }}>
        <defs>
          <linearGradient id="netInGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stopColor="#39ddff" stopOpacity="0.5" />
            <stop offset="1" stopColor="#39ddff" stopOpacity="0" />
          </linearGradient>
          <linearGradient id="netOutGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stopColor="#d4a574" stopOpacity="0.4" />
            <stop offset="1" stopColor="#d4a574" stopOpacity="0" />
          </linearGradient>
        </defs>
        <polygon points={`0,${H} ${inPath} ${W},${H}`} fill="url(#netInGrad)" />
        <polyline points={inPath} fill="none" stroke="#39ddff" strokeWidth="1.2" />
        <polygon points={`0,${H} ${outPath} ${W},${H}`} fill="url(#netOutGrad)" />
        <polyline points={outPath} fill="none" stroke="#d4a574" strokeWidth="1.2" />
      </svg>
    </div>
  );
}

          next: j.next > 0 ? j.next - 1 : 1800,
        }))
      );
    }, 1000);
    return () => clearInterval(t);
  }, []);
  const fmtNext = (s) => s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m ${s%60}s` : `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
  return (
    <div className="stv-panel p-2.5 h-full flex flex-col">
      <div className="flex items-center justify-between mb-1.5">
        <div className="eyebrow">Cron · {jobs.length} jobs<InfoTip text="All scheduled jobs with their cron expressions and countdown to next run. Green = imminent. Watcher scans, cache purges, audits." /></div>
        <div className="mono text-[9px] muted">next run</div>
      </div>
      <div className="divider mb-1.5" />
      <div className="cron-list flex-1">
        {jobs.map((j) => {
          const imminent = j.next < 60;
          return (
            <div key={j.name} className="cron-row">
              <span className="mono text-[9px] gold-text" style={{ width: 90 }}>
                {j.expr.split(' ').slice(0, 2).join(' ')}
              </span>
              <span className="mono text-[9px]" style={{ flex: 1, color: 'var(--text)' }}>{j.name}</span>
              <span className="mono text-[8.5px]" style={{
                width: 60, textAlign: 'right',
                color: imminent ? 'var(--green)' : 'var(--muted)',
              }}>
                {fmtNext(j.next)}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// === MACRO CALENDAR ===
function MacroCalendar() {
  const [events, setEvents] = useState(MACRO_EVENTS);
  useEffect(() => {
    const t = setInterval(() => {
      setEvents((prev) => prev.map((e) => ({ ...e, countdown: Math.max(0, e.countdown - 1) })));
    }, 1000);
    return () => clearInterval(t);
  }, []);
  const fmt = (s) => {
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  };
  return (
    <div className="stv-panel p-2.5 h-full flex flex-col">
      <div className="flex items-center justify-between mb-1.5">
        <div className="eyebrow">Macro Calendar<InfoTip text="Scheduled central bank events (FOMC, ECB, BOJ, BOE) with impact rating and live countdown to release." /></div>

      <div className="macro-list flex-1">
        {events.map((e, i) => {
          const imminent = e.countdown < 7200;
          return (
            <div key={i} className="macro-row">

// === BOND YIELD CURVE ===
function BondYieldCurve() {
  const max = Math.max(...BOND_YIELDS.map(b => b.yield));
  return (
    <div className="stv-panel p-2.5">
      <div className="flex items-center justify-between mb-1.5">
        <div className="eyebrow">UST Yield Curve<InfoTip text="US Treasury yield curve from 1-month to 30-year. The 2s10s spread is a classic recession indicator." /></div>
        <div className="mono text-[9px]" style={{ color: 'var(--gold)' }}>
          2s10s {(BOND_YIELDS[6].yield - BOND_YIELDS[4].yield).toFixed(2)}%
        </div>
      </div>
      <div className="divider mb-2" />
      {/* Curve viz */}
      <svg viewBox="0 0 200 60" preserveAspectRatio="none" style={{ width: '100%', height: 60, display: 'block' }}>
        <defs>
          <linearGradient id="ycGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stopColor="#d4a574" stopOpacity="0.4" />
            <stop offset="1" stopColor="#d4a574" stopOpacity="0" />
          </linearGradient>
        </defs>
        {(() => {
          const W = 200, H = 60;
          const path = BOND_YIELDS.map((b, i) => {
            const x = (i / (BOND_YIELDS.length - 1)) * W;
            const y = H - (b.yield / max) * H * 0.8 - 5;
            return `${x},${y}`;
          });
          return (
            <>
              <polygon points={`0,${H} ${path.join(' ')} ${W},${H}`} fill="url(#ycGrad)" />
              <polyline points={path.join(' ')} fill="none" stroke="#d4a574" strokeWidth="1.5" />
              {BOND_YIELDS.map((b, i) => {
                const x = (i / (BOND_YIELDS.length - 1)) * W;
                const y = H - (b.yield / max) * H * 0.8 - 5;
                return <circle key={i} cx={x} cy={y} r="2" fill="#d4a574" />;
              })}
            </>
          );
        })()}
      </svg>
      {/* Tenor labels */}
      <div className="flex justify-between mono text-[8.5px] muted mt-1">
        {BOND_YIELDS.map((b) => (
          <div key={b.tenor} style={{ textAlign: 'center', flex: 1 }}>
            <div>{b.tenor}</div>
            <div style={{ color: 'var(--text)' }}>{b.yield.toFixed(2)}</div>
            <div style={{ color: b.change > 0 ? 'var(--green)' : 'var(--red)', fontSize: 7.5 }}>
              {b.change > 0 ? '+' : ''}{b.change.toFixed(2)}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// === SECTOR ROTATION RING — SVG flow visualization ===
function SectorRotation() {
  const data = [
    { from: 'Tech',      to: 'Energy',      flow: 1.4 },
    { from: 'Healthcare',to: 'Financials',  flow: 0.9 },
    { from: 'Cons Disc', to: 'Cons Stap',   flow: 0.6 },
    { from: 'Real Est.', to: 'Utilities',   flow: 0.4 },
    { from: 'Tech',      to: 'Financials',  flow: 1.1 },
  ];
  const sectors = ['Tech', 'Energy', 'Financials', 'Healthcare', 'Cons Disc', 'Cons Stap', 'Real Est.', 'Utilities', 'Industrial', 'Materials'];
  const R = 80, CR = 110, CX = 120, CY = 120;
  return (
    <div className="stv-panel p-3 h-full">
      <div className="flex items-center justify-between mb-2">
        <div className="eyebrow">Sector Rotation · capital flow<InfoTip text="Net capital flow between sectors over 5 trading days. Arcs show direction and magnitude; particles animate actual flow." /></div>
        <div className="mono text-[9px] muted">5d rolling</div>
      </div>
      <div className="divider mb-2" />
      <svg viewBox="0 0 240 240" style={{ width: '100%', height: 200, display: 'block' }}>
        <defs>
          <radialGradient id="srGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0" stopColor="#d4a574" stopOpacity="0.08" />
            <stop offset="1" stopColor="#d4a574" stopOpacity="0" />
          </radialGradient>
        </defs>
        <circle cx={CX} cy={CY} r={R} fill="url(#srGrad)" stroke="#d4a574" strokeOpacity="0.25" strokeWidth="1" />
        <circle cx={CX} cy={CY} r={R * 0.6} fill="none" stroke="#39ddff" strokeOpacity="0.12" strokeWidth="1" strokeDasharray="3 3" />
        {/* Sector labels around ring */}
        {sectors.map((s, i) => {
          const ang = (i / sectors.length) * Math.PI * 2 - Math.PI / 2;
          const x = CX + Math.cos(ang) * (R + 18);
          const y = CY + Math.sin(ang) * (R + 18);
          return (
            <g key={s}>
              <circle cx={CX + Math.cos(ang) * R} cy={CY + Math.sin(ang) * R} r="3" fill="#d4a574" />
              <text x={x} y={y} textAnchor="middle" dominantBaseline="middle"
                    style={{ fontFamily: 'var(--mono)', fontSize: 8, fill: '#8ea6c6' }}>
                {s}
              </text>
            </g>
          );
        })}
        {/* Flow arcs */}
        {data.map((d, i) => {
          const fromIdx = sectors.indexOf(d.from);
          const toIdx = sectors.indexOf(d.to);
          if (fromIdx < 0 || toIdx < 0) return null;
          const a1 = (fromIdx / sectors.length) * Math.PI * 2 - Math.PI / 2;
          const a2 = (toIdx / sectors.length) * Math.PI * 2 - Math.PI / 2;
          const x1 = CX + Math.cos(a1) * R * 0.95;
          const y1 = CY + Math.sin(a1) * R * 0.95;
          const x2 = CX + Math.cos(a2) * R * 0.95;
          const y2 = CY + Math.sin(a2) * R * 0.95;
          const mid = `${CX},${CY}`;
          return (
            <g key={i}>
              <path d={`M ${x1},${y1} Q ${mid} ${x2},${y2}`}
                    stroke={i % 2 === 0 ? '#6cf2a8' : '#39ddff'}
                    strokeOpacity={0.3 + d.flow * 0.25}
                    strokeWidth={1 + d.flow}
                    fill="none"
                    style={{ filter: 'drop-shadow(0 0 4px currentColor)' }} />
              <circle r={2 + d.flow}
                      fill={i % 2 === 0 ? '#6cf2a8' : '#39ddff'}
                      opacity={0.9}>
                <animateMotion dur={`${3 + i * 0.3}s`} repeatCount="indefinite"
                               path={`M ${x1 - CX},${y1 - CY} Q ${0},${0} ${x2 - CX},${y2 - CY}`} />
              </circle>
            </g>
          );
        })}
        {/* Center label */}
        <text x={CX} y={CY - 4} textAnchor="middle"
              style={{ fontFamily: 'var(--mono)', fontSize: 9, fill: '#d4a574', letterSpacing: '0.15em' }}>
          FLOW
        </text>
        <text x={CX} y={CY + 8} textAnchor="middle"
              style={{ fontFamily: 'var(--display)', fontSize: 16, fill: '#e8ecf1', fontWeight: 500 }}>
          $4.2B
        </text>
      </svg>
      <div className="mono text-[9px] muted text-center">
        net inflow: <span style={{ color: 'var(--green)' }}>Energy +$1.8B</span> · outflow: <span style={{ color: 'var(--red)' }}>Real Estate −$1.2B</span>
      </div>
    </div>
  );
}

// === HASH CHAIN — SHA-256 chain of broadcasts ===
function randomHex(len) {
  const chars = '0123456789abcdef';
  let out = '';
  for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * 16)];
  return out;
}
function HashChain() {
  const [entries, setEntries] = useState(() =>
    Array.from({ length: 8 }, (_, i) => ({
      block: 74521 - i,
      hash: randomHex(8),
      prev: randomHex(8),
      scripts: 12 + Math.floor(Math.random() * 6),
      ts: Date.now() - i * 12000,
    }))
  );
  useEffect(() => {
    const t = setInterval(() => {
      setEntries((prev) => {
        const last = prev[0];
        const next = {
          block: last.block + 1,
          hash: randomHex(8),
          prev: last.hash,
          scripts: 10 + Math.floor(Math.random() * 8),
          ts: Date.now(),
        };
        return [next, ...prev].slice(0, 8);
      });
    }, 12000);
    return () => clearInterval(t);
  }, []);
  const fmt = (ts) => {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return `${s}s ago`;
    return `${Math.floor(s / 60)}m ago`;
  };
  return (
    <div className="stv-panel p-3 h-full flex flex-col">
      <div className="flex items-center justify-between mb-2">
        <div className="eyebrow">Audit Chain · SHA-256 · immutable<InfoTip text="Every batch of broadcasts is hashed into a SHA-256 chain. Tampering breaks the chain, providing cryptographic audit trail." /></div>
        <Lock size={11} className="gold-text" />

// === SIGNAL SPECTRUM ANALYZER — FFT-style bars ===
function SpectrumAnalyzer() {
  const [bars, setBars] = useState(() => Array.from({ length: 48 }, () => Math.random() * 0.8));
  useEffect(() => {
    const t = setInterval(() => {
      setBars(() => {
        // Simulate a signal with some peaks
        return Array.from({ length: 48 }, (_, i) => {
          const peak1 = Math.exp(-Math.pow((i - 12) / 4, 2)) * 0.8;
          const peak2 = Math.exp(-Math.pow((i - 30) / 5, 2)) * 0.6;
          const noise = Math.random() * 0.15;
          return Math.min(1, peak1 + peak2 + noise);
        });
      });
    }, 120);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="stv-panel p-3">
      <div className="flex items-center justify-between mb-2">
        <div className="eyebrow">Signal Spectrum · FFT 48-bin<InfoTip text="48-bin FFT of the combined market signal. Peaks identify dominant frequencies in price and volume activity." /></div>

      <div className="spectrum">

          return (
            <div key={i} className="spectrum-bar"

                   background: `linear-gradient(to top, ${color}, ${color}88)`,

// === GDP / MACRO MATRIX — countries vs indicators ===
const MACRO_COUNTRIES = ['USA', 'CHN', 'JPN', 'DEU', 'GBR', 'FRA', 'BRA', 'ISR'];
const MACRO_INDICATORS = [
  { key: 'GDP',    unit: '%',  good: 'high' },
  { key: 'CPI',    unit: '%',  good: 'low' },
  { key: 'UNEMP',  unit: '%',  good: 'low' },
  { key: 'PMI',    unit: '',   good: 'high' },
  { key: 'DEBT',   unit: '%',  good: 'low' },
];
function generateMacroMatrix() {
  return MACRO_COUNTRIES.map((c) => {
    return {
      country: c,
      values: MACRO_INDICATORS.map((ind) => {
        let v;
        if (ind.key === 'GDP')   v = 1 + Math.random() * 6;
        else if (ind.key === 'CPI')   v = 1 + Math.random() * 5;
        else if (ind.key === 'UNEMP') v = 3 + Math.random() * 8;
        else if (ind.key === 'PMI')   v = 45 + Math.random() * 15;
        else                           v = 60 + Math.random() * 90;
        return parseFloat(v.toFixed(1));
      }),
    };
  });
}
function MacroMatrix() {
  const [matrix, setMatrix] = useState(() => generateMacroMatrix());
  useEffect(() => {
    const t = setInterval(() => setMatrix(generateMacroMatrix()), 5000);
    return () => clearInterval(t);
  }, []);
  const colorFor = (v, ind) => {
    const normalized = ind.key === 'PMI' ? (v - 40) / 20 :
                       ind.key === 'DEBT' ? 1 - v / 150 :
                       ind.key === 'GDP' ? v / 7 :
                       1 - v / 10;
    const clamped = Math.max(0, Math.min(1, normalized));
    if (ind.good === 'high') {
      if (clamped > 0.6) return `rgba(108, 242, 168, ${0.3 + clamped * 0.5})`;
      if (clamped > 0.3) return `rgba(212, 165, 116, ${0.3 + clamped * 0.5})`;
      return `rgba(255, 122, 122, ${0.3 + (1 - clamped) * 0.5})`;
    } else {
      if (clamped > 0.6) return `rgba(108, 242, 168, ${0.3 + clamped * 0.5})`;
      if (clamped > 0.3) return `rgba(212, 165, 116, ${0.3 + clamped * 0.5})`;
      return `rgba(255, 122, 122, ${0.3 + (1 - clamped) * 0.5})`;
    }
  };
  return (
    <div className="stv-panel p-3">
      <div className="flex items-center justify-between mb-2">
        <div className="eyebrow">Macro Indicators · 8 economies<InfoTip text="GDP, CPI, unemployment, PMI, and debt-to-GDP across 8 major economies. Color-coded for quick reading." /></div>
        <div className="mono text-[9px] muted">latest · YoY</div>
      </div>
      <div className="divider mb-2" />
      <div className="macro-matrix">
        <div className="macro-headers">
          <div className="macro-corner"></div>
          {MACRO_INDICATORS.map((i) => (
            <div key={i.key} className="macro-header mono text-[9px]">{i.key}</div>
          ))}
        </div>
        {matrix.map((row) => (
          <div key={row.country} className="macro-row-x">
            <div className="macro-side mono text-[9px] gold-text">{row.country}</div>
            {row.values.map((v, ci) => (
              <div key={ci} className="macro-cell mono text-[9px]"
                   style={{ background: colorFor(v, MACRO_INDICATORS[ci]) }}>
                {v}{MACRO_INDICATORS[ci].unit}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function StockerTVMissionControl() {
  const [booted, setBooted] = useState(false);
  const [now, setNow] = useState(new Date());
  const [storyIdx, setStoryIdx] = useState(0);
  const [stage, setStage] = useState(0);
  const [events, setEvents] = useState(SAMPLE_HEADLINES.slice(0, 6));
  const [scripts, setScripts] = useState(127);
  const [activeAgents, setActiveAgents] = useState(new Set([3, 11, 18, 24]));
  const [hoveredAgent, setHoveredAgent] = useState(null);
  const [manualReporter, setManualReporter] = useState(null);
  const [arcTrigger, setArcTrigger] = useState(null);
  const [selectedExchange, setSelectedExchange] = useState(null);
  const [brandIdx, setBrandIdx] = useState(0);
  const [focusMode, setFocusMode] = useState(false);
  const [kioskMode, setKioskMode] = useState(false);
  const [perfMode, setPerfMode] = useState(false);
  const [breakingActive, setBreakingActive] = useState(false);
  const [activeView, setActiveView] = useState('mission');
  const [pulseTrigger, setPulseTrigger] = useState(0);
  const brand = BRAND_PRESETS[brandIdx];
  const [exchangeCounts, setExchangeCounts] = useState(() => {
    const counts = {};
    EXCHANGES.forEach((ex) => {
      counts[ex.id] = ex.tier === 1
        ? 14 + Math.floor(Math.random() * 13)
        : ex.tier === 2
        ? 5 + Math.floor(Math.random() * 10)
        : 1 + Math.floor(Math.random() * 5);
    });
    return counts;
  });

  const story = STORIES[storyIdx];
  const reporterIdx = manualReporter != null ? manualReporter : story.reporterIdx;

  // clock — only ticks after boot
  useEffect(() => {
    if (!booted) return;
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, [booted]);

  // pipeline stage advance for current story
  useEffect(() => {
    if (!booted) return;
    setStage(0);
    const timers = [];
    let acc = 0;
    PIPELINE_STAGES.forEach((s, i) => {
      acc += s.ms;
      timers.push(setTimeout(() => setStage(i + 1), acc));
    });
    // after all stages, advance to next story
    const advance = setTimeout(() => {
      setExchangeCounts((prev) => ({
        ...prev,
        [story.exchangeId]: (prev[story.exchangeId] || 0) + 1,
      }));
      setStoryIdx((p) => (p + 1) % STORIES.length);
      setScripts((n) => n + 1);
    }, acc + 1400);
    return () => {
      timers.forEach(clearTimeout);
      clearTimeout(advance);
    };
  }, [storyIdx, booted]);

  // trigger globe arc + focus when story changes
  useEffect(() => {
    if (!booted) return;
    setArcTrigger({ exchangeId: story.exchangeId, up: story.up, ts: Date.now() });
    setManualReporter(null);
    setPulseTrigger((p) => p + 1);
  }, [storyIdx, booted]);

  // event stream
  useEffect(() => {
    if (!booted) return;
    const t = setInterval(() => {
      setEvents((prev) => {
        const next = [...prev];
        const pick = SAMPLE_HEADLINES[Math.floor(Math.random() * SAMPLE_HEADLINES.length)];
        next.unshift({ ...pick, ts: Date.now() });
        return next.slice(0, 7);

      setActiveAgents(() => {
        const s = new Set();

    return () => clearInterval(t);

/* ============================================================
